    <script>
      // Enhanced function to remove the badge element
      function removeBadge() {
        // Target any element with "badge" in its class name or containing "lovable" or "edit with"
        const badgeSelectors = [
          '[class*="badge"]',
          '[class*="lovable"]',
          '[data-lovable-badge]',
          '[data-lovable]',
          '.lovable-badge',
          '#lovable-badge'
        ];
        
        // Remove any element that matches our selectors
        badgeSelectors.forEach(selector => {
          const elements = document.querySelectorAll(selector);
          elements.forEach(el => el.remove());
        });
        
        // Also find any element containing "edit with lovable" text
        document.querySelectorAll('*').forEach(el => {
          if (el.textContent && 
             (el.textContent.toLowerCase().includes('edit with lovable') || 
              el.textContent.toLowerCase().includes('lovable'))) {
            // Check if it's likely a badge element (small, positioned absolute, etc.)
            const style = window.getComputedStyle(el);
            if (style.position === 'fixed' || style.position === 'absolute') {
              el.remove();
            }
          }
        });
      }
      
      // Run immediately and also set up to run when DOM is loaded
      removeBadge();
      document.addEventListener('DOMContentLoaded', removeBadge);
      
      // Also run periodically to ensure badge stays removed
      setInterval(removeBadge, 1000);
      
      // Run after any dynamic content loading
      window.addEventListener('load', removeBadge);
      
      // Create a MutationObserver to watch for dynamically added badges
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length) {
            removeBadge();
          }
        });
      });
      
      // Start observing when DOM is ready
      document.addEventListener('DOMContentLoaded', function() {
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
